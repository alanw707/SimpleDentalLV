name: PR checks

on:
  pull_request:
    branches:
      - main
    paths:
      - 'simple-dental-theme/**'
      - 'deploy-robust.py'
      - '.github/workflows/*.yml'
  workflow_dispatch:

jobs:
  lint:
    name: Lint theme and deploy script
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Lint PHP files
        run: find simple-dental-theme -name "*.php" -print0 | xargs -0 -n1 -r php -l

      - name: Validate deploy script syntax
        run: python3 -m py_compile deploy-robust.py
