name: Deploy WordPress theme

on:
  push:
    branches:
      - main
    paths:
      - 'simple-dental-theme/**'
      - 'deploy-robust.py'
      - '.github/workflows/deploy-theme.yml'
  workflow_dispatch:

concurrency:
  group: production-theme-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Lint and deploy theme
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate required deploy secrets
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_REMOTE_PATH: ${{ secrets.FTP_REMOTE_PATH }}
        run: |
          missing=0
          for var in FTP_HOST FTP_USERNAME FTP_PASSWORD FTP_REMOTE_PATH; do
            if [ -z "${!var}" ]; then
              echo "::error title=Missing secret::$var is not set"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Lint PHP files
        run: find simple-dental-theme -name "*.php" -print0 | xargs -0 -n1 -r php -l

      - name: Deploy theme to production
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_REMOTE_PATH: ${{ secrets.FTP_REMOTE_PATH }}
        run: python3 deploy-robust.py

      - name: Verify live stylesheet matches repository
        run: |
          expected_hash="$(sha256sum simple-dental-theme/style.css | awk '{print $1}')"
          live_url="https://www.simpledentallv.com/wp-content/themes/simple-dental-theme/style.css"
          matched=0

          for attempt in 1 2 3 4 5 6; do
            live_hash="$(curl -fsSL \
              -H 'Cache-Control: no-cache' \
              -H 'Pragma: no-cache' \
              "${live_url}?v=${GITHUB_SHA}-${attempt}" | sha256sum | awk '{print $1}')"

            if [ "$live_hash" = "$expected_hash" ]; then
              echo "Live stylesheet verified on attempt $attempt."
              matched=1
              break
            fi

            echo "Live stylesheet mismatch on attempt $attempt."
            sleep 10
          done

          if [ "$matched" -ne 1 ]; then
            echo "::error title=Live theme verification failed::Public style.css does not match the repository after deploy."
            exit 1
          fi
